[workspace]
resolver = "2"
members = [
    "crates/nexus",
    "crates/nexus-macros",
    "crates/nexus-macros/tests/cross_crate_test",
    "crates/nexus-store",
    "crates/workspace-hack",
    "examples/inmemory",
    "examples/store-and-kernel",
    "examples/store-inmemory",
]
exclude = [
    "crates/nexus-rusqlite",
    "crates/nexus-services",
    "crates/nexus-test-helpers",
    "examples/todo-rusqlite",
]

[workspace.dependencies]
async-trait = "0.1.89"
chrono = { version = "0.4.44", features = ["serde"] }
criterion = { version = "0.8", features = ["html_reports"] }
downcast-rs = "2.0.2"
fake = { version = "4.3.0", features = ["derive", "email_address"] }
proptest = "1.11.0"
refinery = { version = "0.8.16", features = ["rusqlite"] }
rusqlite = { version = "0.33.0", features = ["bundled", "trace", "uuid"] }
serde = { version = "1.0.228", features = ["derive", "rc"] }
serde_json = "1.0.149"
smallvec = "1.15.1"
static_assertions = "1.1.0"
terrors = "0.3.3"
thiserror = "2.0.18"
tokio = { version = "1.50.0", features = ["full"] }
tokio-stream = "0.1.18"
tower = { version = "0.5.3", features = ["util"] }
tracing = "0.1.44"
uuid = { version = "1.23.0", features = ["v7", "fast-rng", "serde", "v4"] }

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Joel DSouza <joel@devrandom.co>"]
repository = "https://github.com/devrandom-labs/nexus"

[workspace.lints.clippy]
# 1. THE FOUNDATION
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }

# 2. THE RUTHLESS RESTRICTIONS
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
disallowed_methods = "deny"
disallowed_types = "deny"

# 3. MEMORY & PERFORMANCE STRICTNESS
clone_on_ref_ptr = "deny"
as_conversions = "deny"
str_to_string = "deny"
implicit_clone = "deny"

# 4. VARIABLE HYGIENE
shadow_reuse = "deny"
shadow_same = "deny"
shadow_unrelated = "deny"

# 5. THE "NO CHEATING" RULE
allow_attributes_without_reason = "deny"

[workspace.metadata.crane]
name = "nexus"
